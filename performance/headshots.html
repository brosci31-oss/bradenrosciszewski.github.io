<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Headshots | Braden Rosciszewski</title>

  <link rel="stylesheet" href="/style.css">

  <style>
    body {
      background: #050505;
      color: white;
      padding: 40px 0;
      font-family: system-ui, sans-serif;
    }

    .page-container {
      max-width: 1100px;
      margin: auto;
      text-align: center;
    }

    h1 {
      margin-bottom: 40px;
    }

    /* ---------------- DESKTOP GRID ---------------- */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 24px;
      margin-top: 40px;
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: #111;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease, opacity 0.4s ease;
    }

    .gallery-item:hover img {
      transform: scale(1.05);
      opacity: 0.85;
    }

    /* ---------------- MOBILE STACK ---------------- */
    @media (max-width: 768px) {
      .gallery-grid {
        display: none;
      }

      .mobile-stack {
        position: relative;
        width: 90%;
        max-width: 350px;
        margin: 40px auto;
        height: 500px;
        perspective: 1000px; /* enables parallax tilt */
      }

      .stack-card {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.15);
        background: #111;
        box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        transition: 
          transform 0.4s ease,
          opacity 0.4s ease,
          box-shadow 0.4s ease;
      }

      .stack-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Peek of next card */
      .stack-card.peek {
        transform: translateY(12px) scale(0.95);
        opacity: 0.7;
      }

      .nav-buttons {
        margin-top: 20px;
        display: flex;
        justify-content: center;
        gap: 20px;
      }

      .nav-buttons button {
        background: transparent;
        border: 1px solid rgba(255,255,255,0.3);
        color: white;
        padding: 10px 18px;
        border-radius: 6px;
        font-size: 16px;
      }

      .nav-buttons button:hover {
        border-color: #a46348;
      }
    }

    /* --- Back Button --- */
    .btn-secondary {
      border: 1px solid rgba(255,255,255,0.2);
      padding: 10px 18px;
      border-radius: 6px;
      color: white;
      text-decoration: none;
      display: inline-block;
      margin-top: 40px;
    }

    .btn-secondary:hover {
      border-color: #a46348;
    }
  </style>
</head>

<body>

  <div class="page-container">
    <h1>Headshots</h1>

    <!-- DESKTOP GRID -->
    <div class="gallery-grid">
      <div class="gallery-item"><img src="/images/headshot1.jpg" alt="Headshot 1"></div>
      <div class="gallery-item"><img src="/images/headshot2.jpg" alt="Headshot 2"></div>
      <div class="gallery-item"><img src="/images/headshot3.jpg" alt="Headshot 3"></div>
      <div class="gallery-item"><img src="/images/headshot4.jpg" alt="Headshot 4"></div>
    </div>

    <!-- MOBILE STACK -->
    <div class="mobile-stack" id="mobileStack">
      <div class="stack-card"><img src="/images/headshot1.jpg"></div>
      <div class="stack-card"><img src="/images/headshot2.jpg"></div>
      <div class="stack-card"><img src="/images/headshot3.jpg"></div>
      <div class="stack-card"><img src="/images/headshot4.jpg"></div>
    </div>

    <div class="nav-buttons">
      <button id="prevBtn">←</button>
      <button id="nextBtn">→</button>
    </div>

    <a href="/performance/index.html" class="btn-secondary">Back to Performance</a>
  </div>

  <script>
    /* ---------------- MOBILE STACK LOGIC ---------------- */
    const cards = document.querySelectorAll('.stack-card');
    let current = 0;

    function updateStack() {
      cards.forEach((card, i) => {
        const offset = i - current;

        // Main card
        if (offset === 0) {
          card.style.transform = "translateY(0px) scale(1)";
          card.style.opacity = 1;
          card.style.zIndex = 100;
          card.classList.remove("peek");
        }

        // Peek card (next one)
        else if (offset === 1) {
          card.style.zIndex = 99;
          card.classList.add("peek");
        }

        // Other cards
        else {
          card.style.transform = "translateY(20px) scale(0.9)";
          card.style.opacity = 0;
          card.style.zIndex = 1;
          card.classList.remove("peek");
        }
      });
    }

    updateStack();

    document.getElementById('nextBtn').onclick = () => {
      current = (current + 1) % cards.length;
      updateStack();
    };

    document.getElementById('prevBtn').onclick = () => {
      current = (current - 1 + cards.length) % cards.length;
      updateStack();
    };

    /* ---------------- SWIPE SUPPORT ---------------- */
    let startX = 0;

    const stack = document.getElementById('mobileStack');

    stack.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
    });

    stack.addEventListener('touchend', e => {
      const endX = e.changedTouches[0].clientX;
      const diff = endX - startX;

      if (diff > 50) {
        current = (current - 1 + cards.length) % cards.length;
        updateStack();
      } else if (diff < -50) {
        current = (current + 1) % cards.length;
        updateStack();
      }
    });

    /* ---------------- PARALLAX TILT ---------------- */
    stack.addEventListener('mousemove', e => {
      const card = cards[current];
      const rect = stack.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width - 0.5;
      const y = (e.clientY - rect.top) / rect.height - 0.5;

      card.style.transform = `
        rotateX(${y * 6}deg)
        rotateY(${x * 6}deg)
        scale(1)
      `;
    });

    stack.addEventListener('mouseleave', () => {
      const card = cards[current];
      card.style.transform = "rotateX(0deg) rotateY(0deg) scale(1)";
    });
  </script>

</body>
</html>
