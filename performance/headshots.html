<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Headshots | Braden Rosciszewski</title>

  <link rel="stylesheet" href="/style.css">

  <style>
    body {
      background: #050505;
      color: white;
      padding: 40px 0;
      font-family: system-ui, sans-serif;
    }

    .page-container {
      max-width: 1100px;
      margin: auto;
      text-align: center;
    }

    h1 {
      margin-bottom: 40px;
    }

    /* --- Gallery Grid --- */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 24px;
      margin-top: 40px;
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: #111;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease, opacity 0.4s ease;
    }

    .gallery-item:hover img {
      transform: scale(1.05);
      opacity: 0.85;
    }

    /* --- Placeholder Style (if no images yet) --- */
    .placeholder-box {
      background: #111;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 60px;
      border-radius: 12px;
      margin-top: 40px;
      color: rgba(255,255,255,0.6);
    }

    /* --- Back Button --- */
    .btn-secondary {
      border: 1px solid rgba(255,255,255,0.2);
      padding: 10px 18px;
      border-radius: 6px;
      color: white;
      text-decoration: none;
      display: inline-block;
      margin-top: 40px;
    }

    .btn-secondary:hover {
      border-color: #a46348;
    }
  </style>
</head>

<body>

  <div class="page-container">
    <h1>Headshots</h1>

    <!-- Replace these placeholders with your real images -->
    <div class="gallery-grid">
      <div class="gallery-item">
        <img src="/images/headshots/headshot1.jpg" alt="Headshot 1">
      </div>
      <div class="gallery-item">
        <img src="/images/headshots/headshot2.jpg" alt="Headshot 2">
      </div>
      <div class="gallery-item">
        <img src="/images/headshots/headshot3.jpg" alt="Headshot 3">
      </div>
      <div class="gallery-item">
        <img src="/images/headshots/headshot4.jpg" alt="Headshot 4">
      </div>
    </div>

    <a href="/performance/index.html" class="btn-secondary">Back to Performance</a>
  </div>

</body>
</html>
